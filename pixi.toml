[workspace]
authors = ["Luan Leal <luanric888@gmail.com>"]
channels = ["conda-forge", "bioconda"]
name = "galapagos"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
build = "pip install -e ."

[dependencies]
jupyterlab = ">=4.4.10,<5"
python = ">=3.14.0,<3.15"
pip = ">=25.2,<26"
ruff = ">=0.14.2,<0.15"
numpy = ">=2.3.4,<3"
matplotlib = ">=3.10.7,<4"
plotnine = ">=0.15.0,<0.16"
polars = ">=1.35.0,<2"
pyarrow = ">=22.0.0,<23"
cmap = ">=0.6.2,<0.7"
plotly = ">=6.4.0,<7"
twine = ">=6.2.0,<7"

[pypi-dependencies]
build = ">=1.3.0, <2"
